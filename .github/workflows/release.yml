# Publica uma release com instalador a cada push de tag vX.Y.Z.
#
# Fluxo: validar versão → PyInstaller → Inno Setup → anexar ao GitHub Release
# duas cópias do instalador:
#   - MarketplaceBot-Setup-X.Y.Z.exe (histórico)
#   - MarketplaceBot-Setup.exe       (nome fixo, para o link permanente
#     .../releases/latest/download/MarketplaceBot-Setup.exe usado no site)
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"  # mesma versão usada em desenvolvimento

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Extrair e validar versão (src/version.py deve bater com a tag)
        shell: pwsh
        run: |
          $m = Select-String -Path src/version.py -Pattern '__version__\s*=\s*"([^"]+)"'
          $version = $m.Matches[0].Groups[1].Value
          $tag = '${{ github.ref_name }}'.TrimStart('v')
          if ($version -ne $tag) {
            Write-Error "src/version.py diz '$version', mas a tag e 'v$tag'. Corrija antes de publicar."
            exit 1
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build (PyInstaller onedir)
        run: python -m PyInstaller build/marketplace-bot.spec --noconfirm

      - name: Instalar Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compilar instalador
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$env:VERSION" build/installer.iss

      - name: Gerar cópia com nome fixo (link permanente)
        shell: pwsh
        run: |
          Copy-Item "dist/installer/MarketplaceBot-Setup-$env:VERSION.exe" `
                    "dist/installer/MarketplaceBot-Setup.exe"

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/MarketplaceBot-Setup*.exe
          generate_release_notes: true
